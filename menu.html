<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shop — Bello's Bakery | Macarons, Cookies, Croissants & Custom Desserts</title>
  <meta name="description" content="Order from Bello's Bakery — signature macarons, cookies, croissants, and custom desserts. Freshly made to order with pickup & local delivery." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Jost:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="icon" href="images/bellosbakerylogo.png" />
</head>
<body data-page="menu">

  <header class="nav" id="nav"></header>

  <section class="menu section section--first" id="menu">
    <div class="menu__illustration reveal">
      <img src="images/menu-illustration.png" alt="Bello's Bakery illustration" loading="lazy"
           onerror="this.closest('.menu__illustration').style.display='none';" />
    </div>
    <div class="section__head reveal">
      <p class="section__eyebrow">Order</p>
      <h1 class="section__title">The Shop</h1>
      <p class="section__lead">Freshly made to order. Pick your favorites, then send your order through the form or message us directly.</p>

    <div class="menu__grid" id="menuGrid"><!-- generated in js/main.js --></div>

    <p class="menu__note reveal">Pickup &amp; local delivery. For custom desserts, cakes, and event orders, reach out and we'll create something special for you.</p>

    <div class="featured__cta reveal" style="margin-top:36px">
      <a href="contact.html" class="btn btn--primary btn--lg">Place Your Order</a>
    </div>
  </section>

  <footer class="footer" id="siteFooter"></footer>

  <script src="js/site.js"></script>
  <script src="js/main.js"></script>
